[build]
  publish = "."
  functions = "netlify/functions"

# Los assets que las funciones leen con fs (fuentes, logos, wasm) deben
# empaquetarse dentro del bundle de cada función.
[functions]
  node_bundler = "esbuild"
  included_files = [
    "netlify/functions/fonts/**",
    "netlify/functions/logos/**",
    "netlify/functions/lib/resvg.wasm"
  ]

# ── Rewrites (status 200 = el crawler ve el HTML/PNG en la MISMA URL) ──
[[redirects]]
  from = "/api/og"
  to = "/.netlify/functions/og"
  status = 200

[[redirects]]
  from = "/wrapped/*"
  to = "/.netlify/functions/wrapped/:splat"
  status = 200
